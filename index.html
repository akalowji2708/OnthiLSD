<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đừng học nữa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }
    .card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 3rem 3.5rem;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .emoji { font-size: 52px; margin-bottom: 1rem; }
    h1 { font-size: 26px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 0.5rem; }
    h1.accent { color: #f472b6; margin-bottom: 2rem; }
    p { color: rgba(255,255,255,0.6); font-size: 14px; margin-bottom: 2rem; }
    .btn-row {
      position: relative;
      height: 52px;
    }
    #okBtn {
      background: #f472b6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      position: absolute;
      left: 0;
      top: 0;
    }
    #okBtn:hover { background: #ec4899; }
    #noBtn {
      background: transparent;
      color: #f472b6;
      border: 2px solid #f472b6;
      border-radius: 12px;
      padding: 12px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      position: absolute;
      right: 0;
      top: 0;
      user-select: none;
    }
    #noBtn:hover { border-color: #ec4899; color: #ec4899; }
  </style>
</head>
<body>
  <div class="card">
  
    <h1>Đừng học nữa,</h1>
    <h1 class="accent">chill đi!</h1>
    <div class="btn-row">
    <button id="okBtn" onclick="document.body.innerHTML=''">OK</button>
      <button id="noBtn">KHÔNG 😤</button>
    </div>
  </div>

  <script>
    const btn = document.getElementById('noBtn');
    let placed = false;

    function randPos() {
      const margin = 60;
      const bw = btn.offsetWidth || 120;
      const bh = btn.offsetHeight || 52;
      const okRect = document.getElementById('okBtn').getBoundingClientRect();
      const maxX = window.innerWidth - bw - margin;
      const maxY = window.innerHeight - bh - margin;
      let x, y, tries = 0;
      do {
        x = Math.floor(Math.random() * (maxX - margin) + margin);
        y = Math.floor(Math.random() * (maxY - margin) + margin);
        tries++;
        const overlap = !(x + bw < okRect.left - 20 || x > okRect.right + 20 || y + bh < okRect.top - 20 || y > okRect.bottom + 20);
        if (!overlap) break;
      } while (tries < 30);
      return { x, y };
    }

    function makeFixed() {
      if (placed) return;
      placed = true;
      const rect = btn.getBoundingClientRect();
      btn.style.position = 'fixed';
      btn.style.right = 'auto';
      btn.style.left = rect.left + 'px';
      btn.style.top = rect.top + 'px';
      btn.style.transition = 'left 0.12s cubic-bezier(.4,2,.6,1), top 0.12s cubic-bezier(.4,2,.6,1)';
    }

    btn.addEventListener('mouseenter', () => {
      makeFixed();
      const p = randPos();
      btn.style.left = p.x + 'px';
      btn.style.top = p.y + 'px';
    });

    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      makeFixed();
      const p = randPos();
      btn.style.left = p.x + 'px';
      btn.style.top = p.y + 'px';
    });

    document.addEventListener('mousemove', (e) => {
      if (!placed) return;
      const rect = btn.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dist = Math.sqrt((e.clientX - cx) ** 2 + (e.clientY - cy) ** 2);
      if (dist < 100) {
        const p = randPos();
        btn.style.left = p.x + 'px';
        btn.style.top = p.y + 'px';
      }
    });
  </script>
</body>
</html>
