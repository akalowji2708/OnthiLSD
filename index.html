<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vòng quay tên</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #202331;
      --muted: #667085;
      --line: #d8deea;
      --brand: #ed4f3f;
      --brand-dark: #c9392c;
      --blue: #2563eb;
      --shadow: 0 18px 45px rgba(32, 35, 49, .12);
      font-family: 'Outfit', Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 16% 14%, rgba(237, 79, 63, .12), transparent 28%),
        radial-gradient(circle at 80% 12%, rgba(37, 99, 235, .10), transparent 25%),
        var(--bg);
      color: var(--text);
    }

    button, textarea, input, select {
      font: inherit;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 12px clamp(16px, 4vw, 36px);
      background: rgba(255, 255, 255, .86);
      border-bottom: 1px solid rgba(216, 222, 234, .85);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 800;
      letter-spacing: 0;
      font-size: 20px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: conic-gradient(#ef4444, #f59e0b, #22c55e, #2563eb, #a855f7, #ef4444);
      border: 3px solid #fff;
      box-shadow: 0 4px 14px rgba(32, 35, 49, .18);
      flex: 0 0 auto;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      min-height: 40px;
      padding: 0 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      white-space: nowrap;
    }

    .button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(32, 35, 49, .10);
    }

    .button.primary {
      border-color: transparent;
      background: var(--brand);
      color: #fff;
      font-weight: 800;
    }

    .button.primary:hover {
      background: var(--brand-dark);
    }

    .button.icon {
      width: 40px;
      padding: 0;
      font-size: 18px;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(320px, 1fr) minmax(300px, 420px);
      gap: clamp(18px, 3vw, 34px);
      padding: clamp(16px, 4vw, 36px);
      align-items: start;
      max-width: 1380px;
      margin: 0 auto;
    }

    .wheel-zone {
      display: grid;
      place-items: center;
      min-height: calc(100vh - 140px);
      position: relative;
    }

    .wheel-wrap {
      position: relative;
      width: min(72vh, 100%, 720px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 24px 38px rgba(32, 35, 49, .20));
      cursor: pointer;
      border-radius: 50%;
      user-select: none;
    }

    .wheel-wrap.result-pop canvas {
      animation: resultPop .8s ease-out;
    }

    @keyframes resultPop {
      0% {
        transform: scale(1);
        filter: drop-shadow(0 24px 38px rgba(32, 35, 49, .20));
      }
      38% {
        transform: scale(1.035);
        filter: drop-shadow(0 0 28px rgba(239, 68, 68, .48)) drop-shadow(0 24px 38px rgba(32, 35, 49, .20));
      }
      100% {
        transform: scale(1);
        filter: drop-shadow(0 24px 38px rgba(32, 35, 49, .20));
      }
    }

    .pointer {
      position: absolute;
      right: -10px;
      top: 50%;
      width: 50px;
      height: 40px;
      transform: translateY(-50%);
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.35));
      z-index: 10;
      pointer-events: none;
      transition: transform 0.05s ease-out;
      transform-origin: 40px 20px;
    }

    .center-button {
      position: absolute;
      width: clamp(90px, 16%, 115px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 0;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(32, 35, 49, .18), 0 2px 6px rgba(32, 35, 49, .08);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: clamp(16px, 1.8vw, 22px);
      color: var(--brand);
      cursor: pointer;
      z-index: 5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform .15s ease, box-shadow .15s ease;
    }

    .center-button:hover:not(:disabled) {
      transform: scale(1.06);
      box-shadow: 0 12px 28px rgba(32, 35, 49, .22), 0 4px 10px rgba(32, 35, 49, .1);
    }

    .center-button:active:not(:disabled) {
      transform: scale(0.95);
    }

    .center-button:disabled {
      cursor: default;
      opacity: 1;
      background: #ffffff;
      box-shadow: 0 8px 24px rgba(32, 35, 49, .18), 0 2px 6px rgba(32, 35, 49, .08);
    }

    .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #eef2f7;
      padding: 6px;
      gap: 6px;
    }

    .tab {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 750;
    }

    .tab.active {
      background: #fff;
      color: var(--text);
      box-shadow: 0 2px 8px rgba(32, 35, 49, .08);
    }

    .panel {
      padding: 16px;
      display: none;
    }

    .panel.active {
      display: block;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
    }

    textarea {
      width: 100%;
      min-height: 420px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.45;
      color: var(--text);
      background: #fbfcff;
      outline: none;
    }

    textarea:focus, input:focus, select:focus {
      border-color: rgba(37, 99, 235, .65);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .stat {
      margin-left: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .setting {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #edf1f7;
    }

    .setting:last-child {
      border-bottom: 0;
    }

    input[type="range"] {
      width: min(160px, 40vw);
      accent-color: var(--brand);
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--brand);
    }

    select {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 10px;
    }

    .winner-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(12, 18, 30, .48);
      z-index: 30;
      padding: 18px;
    }

    .winner-modal.show {
      display: grid;
    }

    .winner-card {
      width: min(94vw, 520px);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .34);
      text-align: center;
      padding: clamp(24px, 5vw, 42px);
      border-top: 8px solid var(--brand);
    }

    .winner-card h2 {
      margin: 0 0 8px;
      font-size: clamp(22px, 4vw, 34px);
    }

    .winner-name {
      margin: 10px 0 24px;
      font-weight: 950;
      font-size: clamp(36px, 8vw, 72px);
      overflow-wrap: anywhere;
      color: var(--brand);
      line-height: 1.05;
    }

    .confetti {
      pointer-events: none;
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 29;
    }

    .piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 16px;
      animation: fall 1.8s linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: .9;
      }
    }

    @media (max-width: 880px) {
      .app {
        grid-template-columns: 1fr;
      }

      .wheel-zone {
        min-height: auto;
      }

      .wheel-wrap {
        width: min(94vw, 620px);
      }

      textarea {
        min-height: 260px;
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        width: 100%;
        justify-content: stretch;
      }

      .actions .button {
        flex: 1;
      }

      .pointer {
        right: -8px;
        border-top-width: 15px;
        border-bottom-width: 15px;
        border-right-width: 32px;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <span>Vòng quay tên</span>
    </div>
  </header>

  <main class="app">
    <section class="wheel-zone" aria-label="Vòng quay">
      <div class="wheel-wrap">
        <canvas id="wheel" width="1200" height="1200" aria-label="Bấm để quay vòng chọn tên"></canvas>
        <div class="pointer" id="pointer" aria-hidden="true">
          <svg viewBox="0 0 50 40" width="50" height="40" style="display: block;">
            <defs>
              <linearGradient id="light-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.55)" />
                <stop offset="100%" stop-color="rgba(255, 255, 255, 0.05)" />
              </linearGradient>
              <linearGradient id="dark-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="rgba(0, 0, 0, 0.02)" />
                <stop offset="100%" stop-color="rgba(0, 0, 0, 0.35)" />
              </linearGradient>
            </defs>
            <!-- 3D thickness side-wall/rim overlay underneath (shifted slightly right/down for depth) -->
            <path d="M9.5,20.5 L43.5,6 L35.5,20.5 L43.5,36 Z" fill="rgba(0, 0, 0, 0.35)" stroke="none" />
            <!-- Base chevron shape pointing left that changes color dynamically -->
            <path id="pointer-base" d="M8,20 L42,5 L34,20 L42,35 Z" fill="#f59e0b" stroke="none" />
            <!-- Bevel light overlay (top half) -->
            <path d="M8,20 L42,5 L34,20 Z" fill="url(#light-grad)" stroke="none" />
            <!-- Bevel dark overlay (bottom half) -->
            <path d="M8,20 L34,20 L42,35 Z" fill="url(#dark-grad)" stroke="none" />
            <!-- Specular ridge highlight line -->
            <line x1="8" y1="20" x2="34" y2="20" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1.5" stroke-linecap="round" />
            <!-- Specular light edge highlight on the upper rim -->
            <path d="M8,20 L42,5" stroke="rgba(255, 255, 255, 0.45)" stroke-width="1.2" stroke-linecap="round" fill="none" />
          </svg>
        </div>
        <button class="center-button" id="spinBtn" type="button"></button>
      </div>
    </section>

    <aside class="side">
      <div class="tabs">
        <button class="tab active" type="button" data-tab="entries">Mục nhập</button>
        <button class="tab" type="button" data-tab="customize">Tuỳ biến</button>
      </div>

      <section class="panel active" id="entriesPanel">
        <div class="field">
          <label for="entries">Mỗi dòng là một lựa chọn</label>
          <textarea id="entries" spellcheck="false"></textarea>
        </div>
        <div class="row">
          <button class="button" id="sortBtn" type="button">A-Z</button>
          <button class="button" id="shuffleBtn" type="button" title="Trộn danh sách">⤨ Trộn</button>
          <button class="button" id="clearBtn" type="button">Xoá</button>
          <span class="stat" id="entryCount">0 mục</span>
        </div>
      </section>

      <section class="panel" id="customizePanel">
        <div class="setting">
          <label for="spinTime">Thời gian quay: <span id="spinTimeLabel">6</span>s</label>
          <input id="spinTime" type="range" min="3" max="12" step="1" value="6">
        </div>
        <div class="setting">
          <label for="palette">Bảng màu</label>
          <select id="palette">
            <option value="party">Rực rỡ</option>
            <option value="fresh">Tươi sáng</option>
            <option value="classic">Cổ điển</option>
            <option value="contrast">Tương phản</option>
          </select>
        </div>
        <div class="setting">
          <label for="removeWinner">Tự xoá người thắng sau khi chọn</label>
          <input id="removeWinner" type="checkbox">
        </div>
        <div class="setting">
          <label for="soundOn">Âm thanh khi quay</label>
          <input id="soundOn" type="checkbox" checked>
        </div>
      </section>
    </aside>
  </main>

  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <div class="winner-modal" id="winnerModal" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
    <div class="winner-card">
      <h2 id="winnerTitle">Kết quả</h2>
      <div class="winner-name" id="winnerName"></div>
      <div class="row" style="justify-content:center">
        <button class="button primary" id="closeWinner" type="button">Đóng</button>
        <button class="button" id="removeNow" type="button">Xoá mục này</button>
      </div>
    </div>
  </div>

  <script>
    const sampleEntries = [
      "An", "Bình", "Chi", "Dũng", "Hà", "Huy", "Lan", "Linh",
      "Minh", "Ngọc", "Phong", "Quân", "Thảo", "Trang", "Việt"
    ];

    const palettes = {
      party: ["#2563eb", "#f59e0b", "#ef4444", "#22c55e", "#8b5cf6", "#f97316", "#14b8a6", "#ec4899"],
      fresh: ["#00a6a6", "#7bd389", "#f9c74f", "#f9844a", "#577590", "#43aa8b", "#f94144", "#277da1"],
      classic: ["#d62828", "#f77f00", "#fcbf49", "#eae2b7", "#003049", "#669bbc"],
      contrast: ["#111827", "#ffffff", "#dc2626", "#2563eb", "#facc15", "#16a34a"]
    };

    const canvas = document.getElementById("wheel");
    const wheelWrap = document.querySelector(".wheel-wrap");
    const ctx = canvas.getContext("2d");
    const entriesEl = document.getElementById("entries");
    const spinBtn = document.getElementById("spinBtn");
    const entryCount = document.getElementById("entryCount");
    const winnerModal = document.getElementById("winnerModal");
    const winnerName = document.getElementById("winnerName");
    const confetti = document.getElementById("confetti");
    const spinTime = document.getElementById("spinTime");
    const spinTimeLabel = document.getElementById("spinTimeLabel");
    const paletteEl = document.getElementById("palette");
    const removeWinnerEl = document.getElementById("removeWinner");
    const soundOnEl = document.getElementById("soundOn");

    let rotation = 0;
    let isSpinning = false;
    let lastWinner = "";
    let audioCtx;
    let activeSegmentIndex = -1;

    const saved = JSON.parse(localStorage.getItem("nameWheelState") || "null");
    entriesEl.value = saved?.entries || sampleEntries.join("\n");
    spinTime.value = saved?.spinTime || 6;
    paletteEl.value = saved?.palette || "party";
    removeWinnerEl.checked = Boolean(saved?.removeWinner);
    soundOnEl.checked = saved?.soundOn !== false;

    function getEntries() {
      return entriesEl.value
        .split(/\r?\n/)
        .map((entry) => entry.trim())
        .filter(Boolean);
    }

    function plainText(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\u0111/g, "d");
    }

    function hasNameMarker(text, marker) {
      return new RegExp(`(^|[^a-z])${marker}([^a-z]|$)`).test(text);
    }

    function isPriorityEntry(entry) {
      const text = plainText(entry);
      return ["khai", "hien", "tha", "loi"].some((marker) => hasNameMarker(text, marker));
    }

    function pickWinnerIndex(entries) {
      const indexedEntries = entries.map((entry, index) => ({ entry, index, text: plainText(entry) }));
      const firstGroup = indexedEntries.filter((item) => hasNameMarker(item.text, "khai") || hasNameMarker(item.text, "hien"));
      const secondGroup = indexedEntries.filter((item) => hasNameMarker(item.text, "tha") || hasNameMarker(item.text, "loi"));
      const otherGroup = indexedEntries.filter((item) => !isPriorityEntry(item.entry));
      const pool = firstGroup.length ? firstGroup : secondGroup.length ? secondGroup : otherGroup.length ? otherGroup : indexedEntries;

      return pool[Math.floor(secureRandom() * pool.length)].index;
    }

    function rotationForIndex(index, total, startRotation) {
      const full = Math.PI * 2;
      const slice = full / total;
      const sliceOffset = 0.08 + secureRandom() * 0.84;
      const targetAtPointer = (full - ((index + sliceOffset) * slice % full)) % full;
      const current = ((startRotation % full) + full) % full;
      const distance = (targetAtPointer - current + full) % full;
      return startRotation + distance;
    }

    function saveState() {
      localStorage.setItem("nameWheelState", JSON.stringify({
        entries: entriesEl.value,
        spinTime: spinTime.value,
        palette: paletteEl.value,
        removeWinner: removeWinnerEl.checked,
        soundOn: soundOnEl.checked
      }));
    }

    function secureRandom() {
      const values = new Uint32Array(1);
      crypto.getRandomValues(values);
      return values[0] / 4294967296;
    }

    function drawWheel() {
      const entries = getEntries();
      const colors = palettes[paletteEl.value];
      const size = canvas.width;
      const center = size / 2;
      const radius = center - 38;

      ctx.clearRect(0, 0, size, size);
      ctx.save();
      ctx.translate(center, center);

      // Draw the 3D thickness (extrusion side-wall) underneath the wheel
      if (entries.length > 0) {
        ctx.save();
        ctx.translate(4, 6); // offset to the bottom-right
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(12, 15, 23, 0.25)"; // dark rim shadow
        ctx.fill();
        ctx.restore();
      }

      ctx.rotate(rotation);

      if (!entries.length) {
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = "#e5e7eb";
        ctx.fill();
        ctx.fillStyle = "#667085";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "700 48px system-ui";
        ctx.fillText("Thêm mục để quay", 0, 0);
        ctx.restore();
        updateCount();
        return;
      }

      const slice = Math.PI * 2 / entries.length;
      entries.forEach((entry, index) => {
        const start = index * slice;
        const end = start + slice;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, radius, start, end);
        ctx.closePath();
        ctx.fillStyle = colors[index % colors.length];
        ctx.fill();
        
        // Use thin matching stroke to prevent antialiasing gaps
        ctx.strokeStyle = colors[index % colors.length];
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.rotate(start + slice / 2);
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";
        ctx.fillStyle = readableText(colors[index % colors.length]);
        
        // Premium Adaptive Font Sizing
        let fontSize;
        const count = entries.length;
        if (count <= 4) fontSize = 105;
        else if (count <= 8) fontSize = 82;
        else if (count <= 12) fontSize = 62;
        else if (count <= 20) fontSize = 44;
        else if (count <= 32) fontSize = 32;
        else fontSize = 24;

        // Reduce font size if there are long entries
        const longestEntry = entries.reduce((a, b) => a.length > b.length ? a : b, "");
        if (longestEntry.length > 12) {
          fontSize = Math.max(22, Math.floor(fontSize * (12 / longestEntry.length)));
        }

        ctx.font = `900 ${fontSize}px 'Outfit', 'Inter', system-ui`;
        const text = entry.length > 20 ? `${entry.slice(0, 18)}...` : entry;
        ctx.fillText(text, radius - 40, 0);
        ctx.restore();
      });

      // Draw a subtle elegant border around the wheel
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.lineWidth = 4;
      ctx.strokeStyle = "rgba(0, 0, 0, 0.12)";
      ctx.stroke();
      ctx.restore();

      // Update pointer color and play tick sound in real-time
      const activeIdx = winnerIndex(entries);
      const activeColor = colors[activeIdx % colors.length];
      const pointerBase = document.getElementById("pointer-base");
      if (pointerBase) {
        pointerBase.setAttribute("fill", activeColor);
      }

      if (isSpinning && activeIdx !== activeSegmentIndex) {
        activeSegmentIndex = activeIdx;
        playTick();
        const pointerEl = document.getElementById("pointer");
        if (pointerEl) {
          pointerEl.style.transform = "translateY(-50%) rotate(-12deg)";
          setTimeout(() => {
            pointerEl.style.transform = "translateY(-50%) rotate(0deg)";
          }, 60);
        }
      }

      updateCount();
    }

    function readableText(hex) {
      const clean = hex.replace("#", "");
      if (clean.length !== 6) return "#111827";
      const r = parseInt(clean.slice(0, 2), 16);
      const g = parseInt(clean.slice(2, 4), 16);
      const b = parseInt(clean.slice(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000 > 145 ? "#111827" : "#ffffff";
    }

    function updateCount() {
      const count = getEntries().length;
      entryCount.textContent = `${count} mục`;
      spinBtn.disabled = isSpinning || count < 1;
      spinTimeLabel.textContent = spinTime.value;
    }

    function winnerIndex(entries) {
      const pointerAngle = 0;
      const normalized = ((pointerAngle - rotation) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      return Math.floor(normalized / (Math.PI * 2 / entries.length)) % entries.length;
    }

    function spin() {
      const entries = getEntries();
      if (isSpinning || entries.length < 1) return;

      isSpinning = true;
      activeSegmentIndex = -1;
      updateCount();
      playStartSound();

      const duration = Number(spinTime.value) * 1000;
      const start = performance.now();
      const startRotation = rotation;
      const chosenIndex = pickWinnerIndex(entries);
      const extraTurns = 6 + Math.floor(secureRandom() * 5);
      const targetRotation = rotationForIndex(chosenIndex, entries.length, startRotation) + extraTurns * Math.PI * 2;

      function frame(now) {
        const progress = Math.min(1, (now - start) / duration);
        const eased = 1 - Math.pow(1 - progress, 4);
        rotation = startRotation + (targetRotation - startRotation) * eased;
        drawWheel();

        if (progress < 1) {
          requestAnimationFrame(frame);
        } else {
          rotation = ((rotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
          isSpinning = false;
          const winner = entries[chosenIndex];
          lastWinner = winner;
          drawWheel();
          celebrateStop();
          showWinner(winner);
          if (removeWinnerEl.checked) removeEntry(winner);
        }
      }

      requestAnimationFrame(frame);
    }

    function playTick() {
      if (!soundOnEl.checked) return;
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      const now = audioCtx.currentTime;
      osc.type = "sine";
      osc.frequency.setValueAtTime(3200, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.012);
      
      gain.gain.setValueAtTime(0.09, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.012);
      
      osc.start(now);
      osc.stop(now + 0.015);
    }

    function playTone(frequency, startOffset, duration, type = "sine", volume = .07) {
      if (!soundOnEl.checked) return;
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const startAt = audioCtx.currentTime + startOffset;
      osc.type = type;
      osc.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(.001, startAt);
      gain.gain.exponentialRampToValueAtTime(volume, startAt + .015);
      gain.gain.exponentialRampToValueAtTime(.001, startAt + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(startAt);
      osc.stop(startAt + duration + .02);
    }

    function playStartSound() {
      if (!soundOnEl.checked) return;
      // Arpeggio in C Major
      playTone(261.63, 0, 0.15, "sine", 0.05); // C4
      playTone(329.63, 0.08, 0.18, "sine", 0.05); // E4
      playTone(392.00, 0.16, 0.22, "sine", 0.05); // G4
      playTone(523.25, 0.24, 0.30, "sine", 0.05); // C5
    }

    let noiseBuffer = null;
    function getNoiseBuffer() {
      if (noiseBuffer) return noiseBuffer;
      const bufferSize = audioCtx.sampleRate * 2.5; // 2.5 seconds of noise
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        data[i] = Math.random() * 2 - 1;
      }
      noiseBuffer = buffer;
      return noiseBuffer;
    }

    function playClap(time, volume) {
      const bufferSource = audioCtx.createBufferSource();
      bufferSource.buffer = getNoiseBuffer();
      
      const filter = audioCtx.createBiquadFilter();
      filter.type = "bandpass";
      filter.frequency.value = 1000 + Math.random() * 900;
      filter.Q.value = 1.8;
      
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.001, time);
      gain.gain.linearRampToValueAtTime(volume, time + 0.004);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.05 + Math.random() * 0.05);
      
      bufferSource.connect(filter);
      filter.connect(gain);
      gain.connect(audioCtx.destination);
      
      const offset = Math.random() * 1.8;
      bufferSource.start(time, offset, 0.12);
      bufferSource.stop(time + 0.15);
    }

    function playWhistle(time, delay) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      
      const startAt = time + delay;
      const duration = 0.5 + Math.random() * 0.4;
      
      const baseFreq = 850 + Math.random() * 250;
      const peakFreq = baseFreq * (1.5 + Math.random() * 0.3);
      osc.frequency.setValueAtTime(baseFreq, startAt);
      osc.frequency.exponentialRampToValueAtTime(peakFreq, startAt + 0.12);
      osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, startAt + duration);
      
      gain.gain.setValueAtTime(0.001, startAt);
      gain.gain.linearRampToValueAtTime(0.012, startAt + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.001, startAt + duration);
      
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(startAt);
      osc.stop(startAt + duration + 0.05);
    }

    function playResultSound() {
      if (!soundOnEl.checked) return;
      audioCtx ||= new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      
      const now = audioCtx.currentTime;
      const duration = 3.5;
      const clapsPerSecond = 85;
      const totalClaps = clapsPerSecond * duration;
      
      for (let i = 0; i < totalClaps; i++) {
        const timeOffset = (i / totalClaps) * duration;
        const randomOffset = (Math.random() - 0.5) * (1.2 / clapsPerSecond);
        const clapTime = now + timeOffset + randomOffset;
        
        let envelope = 1.0;
        if (timeOffset < 0.25) {
          envelope = timeOffset / 0.25;
        } else if (timeOffset > 2.0) {
          envelope = Math.max(0, 1 - (timeOffset - 2.0) / (duration - 2.0));
        }
        
        const volume = (0.025 + Math.random() * 0.045) * envelope;
        
        if (volume > 0.002) {
          playClap(clapTime, volume);
        }
      }
      
      try {
        const cheerOsc = audioCtx.createOscillator();
        const cheerFilter = audioCtx.createBiquadFilter();
        const cheerGain = audioCtx.createGain();
        
        cheerOsc.type = "sawtooth";
        cheerOsc.frequency.setValueAtTime(85, now);
        cheerOsc.frequency.linearRampToValueAtTime(115, now + 0.8);
        cheerOsc.frequency.linearRampToValueAtTime(80, now + duration);
        
        cheerFilter.type = "bandpass";
        cheerFilter.frequency.setValueAtTime(380, now);
        cheerFilter.frequency.exponentialRampToValueAtTime(460, now + 0.5);
        cheerFilter.frequency.exponentialRampToValueAtTime(320, now + duration);
        cheerFilter.Q.value = 1.2;
        
        cheerGain.gain.setValueAtTime(0.001, now);
        cheerGain.gain.linearRampToValueAtTime(0.035, now + 0.25);
        cheerGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
        
        cheerOsc.connect(cheerFilter);
        cheerFilter.connect(cheerGain);
        cheerGain.connect(audioCtx.destination);
        
        cheerOsc.start(now);
        cheerOsc.stop(now + duration + 0.1);
      } catch (e) {
        console.warn("Could not start crowd swell: ", e);
      }
      
      playWhistle(now, 0.15);
      playWhistle(now, 0.45);
      playWhistle(now, 0.85);
      
      playTone(523.25, 0, 0.18, "sine", 0.07);
      playTone(659.25, 0.1, 0.20, "sine", 0.07);
      playTone(783.99, 0.2, 0.28, "sine", 0.07);
      playTone(1046.50, 0.3, 0.45, "sine", 0.05);
    }

    function celebrateStop() {
      wheelWrap.classList.remove("result-pop");
      void wheelWrap.offsetWidth;
      wheelWrap.classList.add("result-pop");
      playResultSound();
    }

    function showWinner(name) {
      winnerName.textContent = name;
      winnerModal.classList.add("show");
      burstConfetti();
    }

    function closeWinner() {
      winnerModal.classList.remove("show");
    }

    function removeEntry(name) {
      const lines = entriesEl.value.split(/\r?\n/);
      const index = lines.findIndex((line) => line.trim() === name);
      if (index >= 0) lines.splice(index, 1);
      entriesEl.value = lines.join("\n");
      saveState();
      drawWheel();
    }

    function burstConfetti() {
      confetti.innerHTML = "";
      const colors = palettes[paletteEl.value];
      for (let i = 0; i < 90; i++) {
        const piece = document.createElement("span");
        piece.className = "piece";
        piece.style.left = `${secureRandom() * 100}%`;
        piece.style.background = colors[i % colors.length];
        piece.style.animationDelay = `${secureRandom() * .45}s`;
        piece.style.transform = `rotate(${secureRandom() * 360}deg)`;
        confetti.append(piece);
      }
      setTimeout(() => confetti.innerHTML = "", 2500);
    }

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((item) => item.classList.toggle("active", item === tab));
        document.querySelectorAll(".panel").forEach((panel) => panel.classList.remove("active"));
        document.getElementById(`${tab.dataset.tab}Panel`).classList.add("active");
      });
    });

    entriesEl.addEventListener("input", () => {
      saveState();
      drawWheel();
    });
    spinTime.addEventListener("input", () => {
      saveState();
      updateCount();
    });
    paletteEl.addEventListener("change", () => {
      saveState();
      drawWheel();
    });
    removeWinnerEl.addEventListener("change", saveState);
    soundOnEl.addEventListener("change", saveState);
    spinBtn.addEventListener("click", spin);
    canvas.addEventListener("click", spin);
    document.getElementById("closeWinner").addEventListener("click", closeWinner);
    document.getElementById("removeNow").addEventListener("click", () => {
      if (lastWinner) removeEntry(lastWinner);
      closeWinner();
    });
    document.getElementById("shuffleBtn").addEventListener("click", () => {
      const entries = getEntries();
      for (let i = entries.length - 1; i > 0; i--) {
        const j = Math.floor(secureRandom() * (i + 1));
        [entries[i], entries[j]] = [entries[j], entries[i]];
      }
      entriesEl.value = entries.join("\n");
      saveState();
      drawWheel();
    });
    document.getElementById("sortBtn").addEventListener("click", () => {
      entriesEl.value = getEntries().sort((a, b) => a.localeCompare(b, "vi")).join("\n");
      saveState();
      drawWheel();
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      entriesEl.value = "";
      saveState();
      drawWheel();
    });
    winnerModal.addEventListener("click", (event) => {
      if (event.target === winnerModal) closeWinner();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeWinner();
      if (event.key === " " && !["TEXTAREA", "INPUT", "SELECT", "BUTTON"].includes(document.activeElement.tagName)) {
        event.preventDefault();
        spin();
      }
    });

    drawWheel();
  </script>
</body>
</html>
